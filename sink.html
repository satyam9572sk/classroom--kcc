    function getweather(){

    const delhi = fetch("https://api.open-meteo.com/v1/forecast?latitude=28.61&longitude=77.23&current_weather=true");
    const gn = fetch("https://api.open-meteo.com/v1/forecast?latitude=19.07&longitude=72.87&current_weather=true");
    const bihar = fetch("https://api.open-meteo.com/v1/forecast?latitude=12.97&longitude=77.59&current_weather=true");

    Promise.all([delhi, gn, bihar])
    .then((responses) => {
        return Promise.all(responses.map((res) => res.json()));
    })
    .then((data) => {

        const [delhiData, gnData, biharData] = data;

        document.getElementById("delhi").innerHTML =
        `Delhi <br> ${delhiData.current_weather.temperature} °C`;

        document.getElementById("gn").innerHTML =
        `Greater Noida <br> ${gnData.current_weather.temperature} °C`;

        document.getElementById("bihar").innerHTML =
        `Bihar <br> ${biharData.current_weather.temperature} °C`;

    })
    .catch((err)=>{
        console.log("Error:", err)
    });

}
