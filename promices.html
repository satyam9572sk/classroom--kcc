<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch api</title>
</head>
<body>
    <button id="loadBtn">Load Users</button>
</body>

<script>
    const btn = document.querySelector("#loadBtn")

    btn.addEventListener("click", loadUsers)

async function loadUsers(){

    const response = await fetch("https://jsonplaceholder.typicode.com/users")

    const data = await response.json() //just pauses the execution of this function until response.json() is resolved and then it assigns the resolved value to data 
    //internally using await is like writing response.json().then(function(data){ console.log(data) }) but with await we can write it in a more synchronous way which is easier to read and understand

    console.log(data)

}
</script>
  
</html>
