<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>India Weather Dashboard</title>

<style>
body{
font-family: Arial;
background: linear-gradient(to right,#1d976c,#93f9b9);
padding:40px;
}

h1{
text-align:center;
color:white;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
width:220px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h1>🇮🇳 Weather Report</h1>

<div class="container">

<div class="card">
<h3>Siwan</h3>
<p id="temp-siwan">Loading...</p>
<p id="wind-siwan"></p>
<p id="time-siwan"></p>
</div>

<div class="card">
<h3>Maharajganj</h3>
<p id="temp-maha">Loading...</p>
<p id="wind-maha"></p>
<p id="time-maha"></p>
</div>

<div class="card">
<h3>Varanasi</h3>
<p id="temp-vara">Loading...</p>
<p id="wind-vara"></p>
<p id="time-vara"></p>
</div>

</div>

<script>

async function loadWeather(city, tempId, windId, timeId){

let geoURL =
`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&country=India`

let geoRes = await fetch(geoURL)
let geoData = await geoRes.json()

let lat = geoData.results[0].latitude
let lon = geoData.results[0].longitude

let weatherURL =
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`

let weatherRes = await fetch(weatherURL)
let weatherData = await weatherRes.json()

document.getElementById(tempId).innerHTML =
" Temp : " + weatherData.current_weather.temperature + " °C"

document.getElementById(windId).innerHTML =
" Wind : " + weatherData.current_weather.windspeed + " km/h"

document.getElementById(timeId).innerHTML =
" Time : " + weatherData.current_weather.time

}


loadWeather("siwan","temp-siwan","wind-siwan","time-siwan")
loadWeather("maharajganj","temp-maha","wind-maha","time-maha")
loadWeather("varanasi","temp-vara","wind-vara","time-vara")

</script>

</body>
</html>
