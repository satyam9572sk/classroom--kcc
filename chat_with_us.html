<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gemini Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .bot-message {
            background-color: #e9ecef;
            color: black;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-box">
            </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // --- PASTE YOUR API KEY HERE ---
        const API_KEY = "AIzaSyBIY5Zv8iugf3Q-6aRAdm4IRWexY9tsT0E"; 
        // -------------------------------

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Show user message
            addMessageToChat("user-message", message);
            inputField.value = ""; 

            // 2. Show a temporary "loading" message
            const loadingId = addMessageToChat("bot-message", "Typing...");

            try {
                // 3. Call the Gemini REST API
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: message }]
                        }]
                    })
                });
                const data = await response.json();
                
                // 4. Remove the "loading" text and show the real response
                document.getElementById(loadingId).remove();

                // NEW: Check if Google sent an error message
                if (data.error) {
                    addMessageToChat("bot-message", "Google API Error: " + data.error.message);
                    return;
                }
                
                if (data.candidates && data.candidates.length > 0) {

                // const data = await response.json();
                
                // // 4. Remove the "loading" text and show the real response
                // document.getElementById(loadingId).remove();
                
                // if (data.candidates && data.candidates.length > 0) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    addMessageToChat("bot-message", botReply);
                } else {
                    addMessageToChat("bot-message", "Error: No response from Gemini.");
                }

            } catch (error) {
                document.getElementById(loadingId).remove();
                addMessageToChat("bot-message", "Connection error. Check your API key and internet.");
                console.error("API Error:", error);
            }
        }

        // Helper function to render messages in the HTML
        function addMessageToChat(className, text) {
            const chatBox = document.getElementById("chat-box");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.id = "msg-" + Date.now(); // Unique ID to easily remove loading text later
            
            // Convert simple line breaks to HTML breaks
            msgDiv.innerHTML = text.replace(/\n/g, "<br>"); 
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
            return msgDiv.id;
        }

        // Allow pressing "Enter" to send
        function handleEnter(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
