<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HN Search</title>

<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        margin:40px;
        background:#f6f6ef;
    }

    h2{
        margin-bottom:20px;
    }

    input{
        padding:8px;
        width:250px;
        font-size:16px;
    }

    button{
        padding:8px 12px;
        font-size:16px;
        cursor:pointer;
    }

    .item{
        padding:10px 0;
        border-bottom:1px solid #ccc;
    }

    .title{
        font-size:18px;
        color:#000;
        text-decoration:none;
        font-weight:bold;
    }

    .read{
        display:block;
        margin-top:5px;
        font-size:14px;
        color:blue;
    }
</style>
</head>

<body>

<h2>Hacker News Search</h2>

<input type="text" id="search" placeholder="Search technology...">
<button onclick="getNews()">Search</button>

<div id="results"></div>

<script>

async function getNews(){

    const query = document.getElementById("search").value;

    const res = await fetch(`https://hn.algolia.com/api/v1/search?query=${query}`);
    const data = await res.json();

    const results = document.getElementById("results");
    results.innerHTML = "";

    data.hits.forEach(news => {

        if(news.title){

            results.innerHTML += `
                <div class="item">
                    <a class="title" href="${news.url || '#'}" target="_blank">
                        ${news.title}
                    </a>

                    <a class="read" href="${news.url || '#'}" target="_blank">
                        Read
                    </a>
                </div>
            `;
        }

    });

}

</script>

</body>
</html>
